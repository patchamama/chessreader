name: CI

on:
  push:
  pull_request:

jobs:
  web:
    name: Frontend (web + chess-shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Typecheck
        run: pnpm --filter web typecheck && pnpm --filter chess-shared typecheck

      - name: Test (web)
        run: pnpm --filter web test

      - name: Test (chess-shared)
        run: pnpm --filter chess-shared test

  api:
    name: Backend (PHP Slim)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test
