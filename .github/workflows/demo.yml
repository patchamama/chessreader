name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build chess-shared
        run: pnpm --filter @chess-ebook/chess-shared build

      - name: Build web (demo)
        working-directory: apps/web
        env:
          VITE_BASE_PATH: /chessreader/
        run: pnpm build

      - name: Ensure mockServiceWorker.js in dist
        run: |
          if [ -f apps/web/public/mockServiceWorker.js ]; then
            cp apps/web/public/mockServiceWorker.js apps/web/dist/mockServiceWorker.js
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
